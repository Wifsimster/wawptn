name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: false
        type: choice
        options:
          - patch
          - minor
          - major
        default: "patch"

concurrency:
  # `cancel-in-progress` USED to be `true`. That interacted badly with the
  # self-push of the `chore: bump version` commit: every release pushed the
  # bump back to main, which fired a second workflow run on the same
  # `release-refs/heads/main` group, which then cancelled the in-flight
  # release mid-way through (between the tag push and the GitHub release
  # creation, typically). Symptom: v0.69.0 cut cleanly, but every
  # subsequent feat/fix merge silently produced no release. Queue runs
  # instead — the bump-commit run is cheap (detect-release short-circuits
  # it in a few seconds), so queuing barely adds latency on real releases.
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  detect-release:
    name: Detect Release Type
    runs-on: ubuntu-latest
    # Skip CI's own version bump commits (belt-and-suspenders with GITHUB_TOKEN behavior)
    if: >-
      github.event_name == 'workflow_dispatch'
      || (
        github.event_name == 'push'
        && github.actor != 'github-actions[bot]'
        && !startsWith(github.event.head_commit.message, 'chore: bump version')
      )
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      bump_type: ${{ steps.check.outputs.bump_type }}
    steps:
      - name: Analyze commit for release type
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          EVENT_NAME: ${{ github.event_name }}
          VERSION_INPUT: ${{ inputs.version_type }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "bump_type=$VERSION_INPUT" >> $GITHUB_OUTPUT
            exit 0
          fi

          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)

          # If this is a merge commit, use the PR title (3rd line) instead
          if echo "$FIRST_LINE" | grep -qE "^Merge pull request #"; then
            FIRST_LINE=$(echo "$COMMIT_MSG" | sed -n '3p')
          fi

          if echo "$FIRST_LINE" | grep -qE "^(feat|feature)(\(.+\))?!:|^BREAKING CHANGE:"; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "bump_type=major" >> $GITHUB_OUTPUT
          elif echo "$FIRST_LINE" | grep -qE "^(feat|feature)(\(.+\))?:"; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "bump_type=minor" >> $GITHUB_OUTPUT
          elif echo "$FIRST_LINE" | grep -qE "^fix(\(.+\))?:"; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "bump_type=patch" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: [detect-release]
    if: needs.detect-release.outputs.should_release == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check for leaked secrets in frontend
        run: |
          if grep -r 'STRIPE_SECRET_KEY\|STRIPE_WEBHOOK_SECRET' packages/frontend/; then
            echo "::error::Stripe secrets found in frontend code!"
            exit 1
          fi

      - name: Run linter
        run: npm run lint

      - name: Type check
        run: npm run build:types

  release:
    name: Create Release & Publish Docker Image
    runs-on: ubuntu-latest
    needs: [lint, detect-release]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      # Rebase onto the latest origin/main BEFORE bumping so a previous
      # release's `chore: bump version` commit (queued ahead of us by
      # `concurrency.cancel-in-progress: false`) is picked up. Without
      # this, the bump runs against a stale base and `git push origin
      # main` later rejects as non-fast-forward.
      - name: Sync with latest origin/main
        run: |
          git fetch origin main
          git rebase origin/main

      - name: Bump version
        env:
          HUSKY: "0"
        run: npm run version:${{ needs.detect-release.outputs.bump_type }}

      - name: Read version
        id: version
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "## What's Changed" > CHANGELOG_TEMP.md
          echo "" >> CHANGELOG_TEMP.md
          if [ -z "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"- %s (%h)" >> CHANGELOG_TEMP.md
          else
            git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges >> CHANGELOG_TEMP.md
          fi
          echo "changelog_file=CHANGELOG_TEMP.md" >> $GITHUB_OUTPUT

      # Diff-guard: if `npm run version:*` somehow left the worktree clean
      # (e.g. a re-run after a partially-committed previous attempt), skip
      # the commit so `git commit` doesn't exit 1 and kill the job.
      - name: Commit version bump
        env:
          HUSKY: "0"
        run: |
          git add package.json packages/*/package.json package-lock.json
          if git diff --staged --quiet; then
            echo "No version changes staged — skipping commit (likely a re-run)."
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          fi

      - name: Create tag
        run: git tag -fa "v${{ steps.version.outputs.new_version }}" -m "Release v${{ steps.version.outputs.new_version }}"

      # Push git BEFORE Docker. Previously Docker was pushed first, so a
      # failing `git push origin main` left the registry with a v<new>
      # image that had no corresponding git tag or commit. Reordering keeps
      # git as the source of truth: if step (1) fails we abort before
      # burning Docker build time or polluting GHCR.
      #
      # Retry loop handles the expected race: another release's bump
      # commit can land between our rebase and our push. Pull --rebase
      # picks it up and we retry — up to 4 attempts with exponential
      # backoff matching the agent-side guidance elsewhere in the repo.
      - name: Push git changes (retry on non-fast-forward)
        env:
          HUSKY: "0"
        run: |
          set -e
          attempt=0
          max_attempts=4
          delay=2
          until [ $attempt -ge $max_attempts ]; do
            if git push origin main && git push origin "v${{ steps.version.outputs.new_version }}"; then
              echo "Push succeeded on attempt $((attempt+1))."
              break
            fi
            attempt=$((attempt+1))
            if [ $attempt -ge $max_attempts ]; then
              echo "::error::Failed to push git changes after $max_attempts attempts."
              exit 1
            fi
            echo "Push failed. Pulling --rebase and retrying in ${delay}s (attempt $((attempt+1))/$max_attempts)."
            sleep $delay
            delay=$((delay*2))
            git fetch origin main
            git rebase origin/main
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version parts
        id: version_parts
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f1-2)
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "full=$VERSION" >> $GITHUB_OUTPUT

      - name: Capture build metadata
        id: meta
        # `github.event.repository.updated_at` used to feed BUILD_DATE but
        # that's when the repo metadata last changed, not when this image
        # was built. Emit the real build timestamp + short SHA here so the
        # image honestly reflects its provenance.
        run: |
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/wifsimster/wawptn:latest
            ghcr.io/wifsimster/wawptn:v${{ steps.version_parts.outputs.full }}
            ghcr.io/wifsimster/wawptn:${{ steps.version_parts.outputs.minor }}
            ghcr.io/wifsimster/wawptn:${{ steps.version_parts.outputs.major }}
            ghcr.io/wifsimster/wawptn:sha-${{ steps.meta.outputs.short_sha }}
          build-args: |
            VERSION=${{ steps.version.outputs.new_version }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
          # amd64-only: production target is x86_64. Re-add arm64 with native runners if needed.
          platforms: linux/amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: Release v${{ steps.version.outputs.new_version }}
          body_path: ${{ steps.changelog.outputs.changelog_file }}
          draft: false
          prerelease: false

  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    needs: [release]
    steps:
      - name: Deploy
        run: /home/deploy/deploy-wawptn.sh
