services:
  postgres:
    image: postgres:16-alpine
    container_name: wawptn-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-wawptn}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wawptn_secret}
      POSTGRES_DB: ${DB_NAME:-wawptn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wawptn}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
