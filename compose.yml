name: wawptn

services:
  wawptn:
    image: ghcr.io/wifsimster/wawptn:latest
    container_name: wawptn
    restart: unless-stopped
    # Safety ceilings so a leak or runaway cannot starve the host (and the
    # database alongside it). Tune to the host once real usage is observed.
    mem_limit: 1g
    cpus: 1.5
    pids_limit: 512
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    env_file:
      - .env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-wawptn}:${DB_PASSWORD:-wawptn}@wawptn-postgres:5432/${DB_NAME:-wawptn}
      - APP_SECRET=${APP_SECRET}
      - STEAM_API_KEY=${STEAM_API_KEY}
      - API_URL=https://wawptn.battistella.ovh
      - CORS_ORIGIN=https://wawptn.battistella.ovh
      - DISCORD_BOT_API_SECRET=${DISCORD_BOT_API_SECRET}
      # Reach the bot's internal HTTP API across the compose network so that
      # starting/closing a vote on the web surfaces in the linked Discord
      # channel. Without this the backend's isBotClientEnabled() short-circuits
      # to false and no bot-backed message is ever posted.
      - DISCORD_BOT_HTTP_URL=http://wawptn-discord:3001
      - ADMIN_STEAM_ID=${ADMIN_STEAM_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=lan"
      - "traefik.http.routers.wawptn.entrypoints=websecure"
      - "traefik.http.routers.wawptn.rule=Host(`wawptn.battistella.ovh`)"
      - "traefik.http.routers.wawptn.tls=true"
      - "traefik.http.routers.wawptn.tls.certresolver=letsencrypt"
      - "traefik.http.services.wawptn.loadBalancer.server.port=8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      lan:

  wawptn-discord:
    image: ghcr.io/wifsimster/wawptn:latest
    container_name: wawptn-discord
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 256
    command: ["node", "packages/discord/dist/index.js"]
    env_file:
      - .env
    environment:
      - TZ=Europe/Paris
      - NODE_ENV=production
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_APPLICATION_ID=${DISCORD_APPLICATION_ID}
      - DISCORD_BOT_API_SECRET=${DISCORD_BOT_API_SECRET}
      - BACKEND_URL=http://wawptn:8080
      # Bind the internal HTTP API on all interfaces so the backend container
      # can reach it over the compose network. The default 127.0.0.1 only
      # accepts connections from inside this container, which makes the
      # backend -> bot link unreachable and silently drops vote messages.
      - DISCORD_BOT_HTTP_HOST=0.0.0.0
      - DISCORD_BOT_HTTP_PORT=3001
    depends_on:
      wawptn:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      lan:

  postgres:
    image: postgres:16-alpine
    container_name: wawptn-postgres
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.5
    pids_limit: 256
    environment:
      - POSTGRES_USER=${DB_USER:-wawptn}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-wawptn}
      - POSTGRES_DB=${DB_NAME:-wawptn}
      - PGDATA=/var/lib/postgresql/data/pgdata
      - TZ=Europe/Paris
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      lan:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wawptn}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Daily pg_dump → ./backups, 7-day retention. Reuses the trusted Postgres
  # image (no extra third-party dependency).
  # IMPORTANT: ./backups lives on the same host as the database — for a real
  # disaster-recovery guarantee, sync that directory off-host (object
  # storage / another machine) and periodically test a restore.
  postgres-backup:
    image: postgres:16-alpine
    container_name: wawptn-postgres-backup
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 64
    environment:
      - PGHOST=wawptn-postgres
      - PGUSER=${DB_USER:-wawptn}
      - PGPASSWORD=${DB_PASSWORD:-wawptn}
      - PGDATABASE=${DB_NAME:-wawptn}
      - TZ=Europe/Paris
      - BACKUP_RETENTION_DAYS=7
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      lan:
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "[backup] postgres backup sidecar started"
        while true; do
          ts=$$(date +%Y%m%d-%H%M%S)
          if pg_dump --no-owner --format=custom --file="/backups/wawptn-$$ts.dump"; then
            echo "[backup] wrote wawptn-$$ts.dump"
          else
            echo "[backup] pg_dump FAILED at $$ts" >&2
          fi
          find /backups -name 'wawptn-*.dump' -mtime +$${BACKUP_RETENTION_DAYS:-7} -delete
          sleep 86400
        done

volumes:
  postgres-data:

networks:
  lan:
    external: true
